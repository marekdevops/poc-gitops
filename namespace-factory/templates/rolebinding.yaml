apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: poc-dev-binding
  namespace: {{ .Values.namespace.name }}
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: {{ .Values.rbac.devGroup }}
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: poc-ops-binding
  namespace: {{ .Values.namespace.name }}
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: {{ .Values.rbac.opsGroup }}
roleRef:
  kind: ClusterRole
  name: admin
  apiGroup: rbac.authorization.k8s.io
